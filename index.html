<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./output.css" />
    <title>Nike</title>
  </head>
  <body>
    <header class="py-3.75">
      <nav class="w-full max-w-317.5 mx-auto flex items-center justify-between">
        <a href="./index.html">
          <img src="../img/brand_logo.svg" alt="" />
        </a>
        <div class="flex gap-6 font-semibold">
          <a href="#">MENU</a>
          <a href="#">LOCATION</a>
          <a href="#">ABOUT</a>
          <a href="#">CONTACT</a>
        </div>
        <button class="py-2 px-4 bg-[#D01C28] text-white rounded-lg">
          login
        </button>
      </nav>
    </header>
    <main>
      <section class="pt-20">
        <div class="w-full max-w-317.5 mx-auto flex items-center gap-5">
          <div>
            <h1
              class="text-[108px] font-extrabold max-w-146.5 leading-25.5 mb-9"
            >
              YOUR FEET DESERVE THE BEST
            </h1>
            <p
              class="max-w-101 font-semibold text-[16px] leading-[100%] mb-5 text-[#5A5959]"
            >
              YOUR FEET DESERVE THE BEST AND WE’RE HERE TO HELP YOU WITH OUR
              SHOES.YOUR FEET DESERVE THE BEST AND WE’RE HERE TO HELP YOU WITH
              OUR SHOES.
            </p>
            <div class="flex gap-2 mb-5">
              <button
                class="py-2 px-4 bg-[#D01C28] text-2xl font-semibold text-white"
              >
                Shop Now
              </button>
              <button
                class="py-2 px-4 border-2 text-2xl font-semibold text-[#5A5959]"
              >
                Category
              </button>
            </div>
            <div>
              <p class="text-[#5A5959] pb-4">Also Available On</p>
              <div class="flex items-center gap-4">
                <span><img src="../img/flipkart.svg" alt="flipkart" /></span>
                <span><img src="../img/amazon.svg" alt="amazon" /></span>
              </div>
            </div>
          </div>
          <div><img src="../img/nike.svg" alt="" /></div>
        </div>
      </section>
    </main>
  </body>
</html>
